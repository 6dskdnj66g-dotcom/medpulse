version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Riyadh"
    open-pull-requests-limit: 5
    versioning-strategy: "increase"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      next:
        patterns:
          - "next"
          - "@next/*"
          - "eslint-config-next"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      ai-providers:
        patterns:
          - "@ai-sdk/*"
          - "ai"
          - "groq-sdk"
          - "@google/generative-ai"
      supabase:
        patterns:
          - "@supabase/*"
      testing:
        patterns:
          - "jest"
          - "jest-*"
          - "@testing-library/*"
          - "@types/jest"
      types:
        patterns:
          - "@types/*"
        exclude-patterns:
          - "@types/react"
          - "@types/react-dom"
          - "@types/jest"
    ignore:
      # Tailwind v4 is a major rewrite — pin manual upgrades
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Riyadh"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "ci"
